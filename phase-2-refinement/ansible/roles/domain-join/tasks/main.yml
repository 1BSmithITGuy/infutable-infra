# Windows role:  domain-join

#  Description:  Join Windows to a domain (not for DCs).

#  Variables:
#     domain_admin_password (lab demo - use CLI)
#     domain_admin_user (lab demo - use CLI)
#     domain_name
#     domain_ou_path (If no value is specified, it will be in default OU)


---
- name: "Join {{ domain_name }}"
  microsoft.ad.membership:
    dns_domain_name: "{{ domain_name }}"
    domain_admin_user: "{{ domain_admin_user }}"
    domain_admin_password: "{{ domain_admin_password }}"
    domain_ou_path: "{{ domain_ou_path | default(omit) }}"
    state: domain
  register: domain_join

- name: Reboot after domain join
  ansible.windows.win_reboot:
  when: domain_join.reboot_required
